# audits/project.toml — LYRA project config for embr
# Generated by: python3 audits/session.py init
# Detected directories: backend, apps, packages, supabase, .github/workflows

[project]
name = "embr"
description = ""
stack = "Turborepo"

[preflight]
lint = "npm run lint"
typecheck = "npm run typecheck"
test = "npm run test"
build = "npm run build"
cwd = ""
# Visual-only audits do not require green preflight; use:
#   python3 audits/session.py visual-batch --skip-preflight

# --- Agent paths ---
# Fill in the paths each agent should examine in YOUR repo.
# Use globs. session.py verifies they exist before including them.
# Leave arrays empty to let session.py auto-detect.

[paths.logic]
source = ["backend/**", "apps/**", "packages/**"]
config = ["package.json"]

[paths.data]
migrations = ["supabase/migrations/**"]
types = []
validation = []
writers = []

[paths.ux]
ui = ["apps/**"]
styles = []
i18n = []

[paths.performance]
queries = []
fetching = []
build_config = ["package.json"]

[paths.security]
auth = []
endpoints = []
env = [".env.example"]

[paths.deploy]
build = []
ci = [".github/workflows/**"]
infra = []
logging = []

[paths.visual]
ui = ["apps/**"]
styles = []
config = []

[integrations.linear]
api_key_env = "LINEAR_API_KEY"
team_id_env = "LINEAR_TEAM_ID"
project_id_env = "LINEAR_PROJECT_ID"
label_ids_env = "LINEAR_LABEL_IDS"
