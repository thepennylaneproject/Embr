name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  merge_group:
    branches: [main, develop]
    types: [checks_requested]

# Shared database env for all steps that need Postgres/Prisma
env:
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/embr_test"
  DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/embr_test"

jobs:
  validate:
    name: Validate (build, typecheck, test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: embr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Shared packages ──────────────────────────────────────────────────────

      - name: Build shared packages
        run: npm run build:types

      # ── Prisma ───────────────────────────────────────────────────────────────

      - name: Generate Prisma client
        run: npm run db:generate

      # The add_rls_policies migration contains `GRANT CONNECT ON DATABASE embr
      # TO embr_app` which is hardcoded to the production database name.  Create
      # an `embr` database in the CI cluster so that GRANT succeeds when the
      # migration runs against `embr_test`.
      - name: Create embr database (migration GRANT CONNECT compatibility)
        env:
          PGPASSWORD: postgres
        run: |
          # Create the `embr` database only if it doesn't already exist.
          # `\gexec` sends the SELECT result as a new SQL command, so it's a
          # no-op (empty result set) when the DB exists and runs CREATE DATABASE
          # otherwise.  The PGPASSWORD env provides the superuser password.
          psql -U postgres -h localhost -p 5432 -c \
            "SELECT 'CREATE DATABASE embr' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'embr')\gexec"

      - name: Run database migrations
        run: npm run db:migrate:deploy

      - name: Validate Prisma schema
        run: npm run db:validate

      # ── RLS smoke check ──────────────────────────────────────────────────────
      # Connects as the least-privilege `embr_app` role (non-superuser, subject
      # to Row-Level Security) and asserts that an unauthenticated query against
      # the "User" table returns zero rows.  This verifies that RLS policies
      # created by the add_rls_policies migration are actually enforced and not
      # silently bypassed by a superuser connection.

      - name: Set up embr_app role for CI test database
        env:
          PGPASSWORD: postgres
        run: |
          psql -U postgres -h localhost -p 5432 -d embr_test <<'SQL'
            DO $$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'embr_app') THEN
                CREATE ROLE embr_app WITH LOGIN PASSWORD 'embr_app_dev_password';
              END IF;
            END
            $$;
            GRANT CONNECT ON DATABASE embr_test TO embr_app;
            GRANT USAGE ON SCHEMA public TO embr_app;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO embr_app;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO embr_app;
          SQL

      - name: RLS smoke check – embr_app cannot read User rows without session context
        env:
          PGPASSWORD: postgres
        run: |
          # Insert a sentinel row as the superuser (superuser bypasses RLS)
          psql -U postgres -h localhost -p 5432 -d embr_test -c "
            INSERT INTO \"User\" (id, email, username, \"passwordHash\", role, \"createdAt\", \"updatedAt\")
            VALUES ('rls-smoke-test-id', 'rls-smoke@test.local', 'rls_smoke_user', 'x', 'user', NOW(), NOW())
            ON CONFLICT (id) DO NOTHING;
          "
          # Connect as the least-privilege embr_app role (non-superuser, no session context)
          # RLS is enforced: the service-bypass policy requires app.bypass_rls='on'
          # and the select policy requires app.current_user_id to be set.
          # Neither is set here, so embr_app must see 0 rows.
          ROW_COUNT=$(PGPASSWORD=embr_app_dev_password psql -U embr_app -h localhost -p 5432 -d embr_test -t -A -c \
            "SELECT COUNT(*) FROM \"User\";")
          echo "embr_app unauthenticated row count: ${ROW_COUNT}"
          # Clean up sentinel row (as superuser)
          psql -U postgres -h localhost -p 5432 -d embr_test -c \
            "DELETE FROM \"User\" WHERE id = 'rls-smoke-test-id';"
          if [ "${ROW_COUNT}" != "0" ]; then
            echo "FAIL: embr_app can read User rows without a session context – RLS is not enforced."
            exit 1
          fi
          echo "PASS: RLS is enforced for embr_app."

      # ── API ──────────────────────────────────────────────────────────────────

      # The API has 666+ pre-existing TypeScript strict-mode errors that prevent
      # tsc from succeeding. This is tracked as technical debt. The step is kept
      # visible (non-blocking) so new errors are still surfaced in PR diffs.
      - name: Typecheck API (non-blocking – pre-existing TS errors)
        run: npx tsc --noEmit --project apps/api/tsconfig.build.json
        continue-on-error: true

      # nest build also fails due to the same TS strict errors. Non-blocking
      # until the debt is resolved; runtime validation uses transpile-only mode.
      - name: Build API (non-blocking – pre-existing TS errors)
        run: npm --prefix apps/api run build
        continue-on-error: true

      - name: Test API (unit)
        run: npm --prefix apps/api run test:unit

      # The API has pre-existing lint violations. Non-blocking until those are
      # resolved; new violations are still surfaced in PR diffs.
      - name: Lint API (non-blocking – pre-existing lint violations)
        run: npm --prefix apps/api run lint
        continue-on-error: true

      # ── Web ──────────────────────────────────────────────────────────────────

      # Build first so next-env.d.ts is generated before tsc runs.
      - name: Build Web
        run: npm --prefix apps/web run build
        env:
          # Placeholder so Next.js does not warn about a missing public var.
          NEXT_PUBLIC_API_URL: http://localhost:3003 # pragma: allowlist secret

      - name: Typecheck Web
        run: npx tsc --noEmit --project apps/web/tsconfig.json

      # next lint resolves @embr/config/eslint but ESLint's older config loader
      # may not follow package exports. Non-blocking until the config path issue
      # is resolved.
      - name: Lint Web (non-blocking – ESLint config loader issue)
        run: npm --prefix apps/web run lint
        continue-on-error: true

  # ── Security ─────────────────────────────────────────────────────────────────
  security:
    name: Security scan (Snyk)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk security scan
        # Only runs when the SNYK_TOKEN secret is configured.
        if: ${{ secrets.SNYK_TOKEN != '' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
