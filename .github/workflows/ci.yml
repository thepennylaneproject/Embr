name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  merge_group:
    branches: [main, develop]
    types: [checks_requested]

# Shared database env for all steps that need Postgres/Prisma
env:
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/embr_test"
  DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/embr_test"

jobs:
  validate:
    name: Validate (build, typecheck, test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: embr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Shared packages ──────────────────────────────────────────────────────

      - name: Build shared packages
        run: npm run build:types

      # ── Prisma ───────────────────────────────────────────────────────────────

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run database migrations
        run: npm run db:migrate:deploy

      - name: Validate Prisma schema
        run: npm run db:validate

      # ── API ──────────────────────────────────────────────────────────────────

      # The API has 666+ pre-existing TypeScript strict-mode errors that prevent
      # tsc from succeeding. This is tracked as technical debt. The step is kept
      # visible (non-blocking) so new errors are still surfaced in PR diffs.
      - name: Typecheck API (non-blocking – pre-existing TS errors)
        run: npx tsc --noEmit --project apps/api/tsconfig.build.json
        continue-on-error: true

      # nest build also fails due to the same TS strict errors. Non-blocking
      # until the debt is resolved; runtime validation uses transpile-only mode.
      - name: Build API (non-blocking – pre-existing TS errors)
        run: npm --prefix apps/api run build
        continue-on-error: true

      - name: Test API (unit)
        run: npm --prefix apps/api run test:unit

      # ── Web ──────────────────────────────────────────────────────────────────

      # Build first so next-env.d.ts is generated before tsc runs.
      - name: Build Web
        run: npm --prefix apps/web run build
        env:
          # Placeholder so Next.js does not warn about a missing public var.
          NEXT_PUBLIC_API_URL: http://localhost:3003 # pragma: allowlist secret

      - name: Typecheck Web
        run: npx tsc --noEmit --project apps/web/tsconfig.json

      # next lint resolves @embr/config/eslint but ESLint's older config loader
      # may not follow package exports. Non-blocking until the config path issue
      # is resolved.
      - name: Lint Web (non-blocking – ESLint config loader issue)
        run: npm --prefix apps/web run lint
        continue-on-error: true

  # ── Security ─────────────────────────────────────────────────────────────────
  security:
    name: Security scan (Snyk)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk security scan
        # Only runs when the SNYK_TOKEN secret is configured.
        if: ${{ secrets.SNYK_TOKEN != '' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
